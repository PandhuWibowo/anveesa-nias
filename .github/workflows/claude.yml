name: Claude Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - uses: actions/checkout@v4

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Fetch PR data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.pr.outputs.number }}
          gh pr view $PR --json title,additions,deletions,changedFiles \
            -q '"PR: \(.title)\nFiles: \(.changedFiles) | +\(.additions) -\(.deletions)"' > pr_title.txt
          gh pr diff $PR > pr.diff 2>/dev/null || touch pr.diff

      - name: Call OpenRouter and post review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, subprocess, re

          MAX_CHARS = 80000

          api_key    = os.environ['OPENROUTER_API_KEY']
          event_name = os.environ['EVENT_NAME']
          comment_body = os.environ.get('COMMENT_BODY', '')
          pr_number  = os.environ['PR_NUMBER']
          gh_token   = os.environ['GH_TOKEN']

          with open('pr_title.txt') as f:
              pr_title = f.read().strip()
          with open('pr.diff') as f:
              full_diff = f.read().strip()

          def parse_and_annotate(diff_text):
              """Annotate added lines with [L<n>] and collect valid (file, line) pairs."""
              valid = {}   # {filename: set(line_numbers)}
              sections = re.split(r'(?=^diff --git )', diff_text, flags=re.MULTILINE)
              out = []
              for section in sections:
                  if not section.strip():
                      continue
                  cur_file, new_ln = None, 0
                  annotated = []
                  for line in section.split('\n'):
                      if line.startswith('diff --git'):
                          m = re.search(r' b/(.+)$', line)
                          if m:
                              cur_file = m.group(1)
                              valid[cur_file] = set()
                          annotated.append(line)
                      elif line.startswith('@@'):
                          m = re.search(r'\+(\d+)', line)
                          if m:
                              new_ln = int(m.group(1)) - 1
                          annotated.append(line)
                      elif line.startswith('+') and not line.startswith('+++'):
                          new_ln += 1
                          if cur_file:
                              valid[cur_file].add(new_ln)
                          annotated.append(f'+[L{new_ln}] {line[1:]}')
                      elif line.startswith('-') and not line.startswith('---'):
                          annotated.append(line)
                      else:
                          if not line.startswith(('---', '+++')):
                              new_ln += 1
                          annotated.append(line)
                  out.append('\n'.join(annotated))
              return '\n'.join(out), valid

          # Fit as many file sections as possible within MAX_CHARS
          file_sections = re.split(r'(?=^diff --git )', full_diff, flags=re.MULTILINE)
          included, total, truncated = [], 0, False
          for s in file_sections:
              if not s.strip():
                  continue
              if total + len(s) > MAX_CHARS:
                  truncated = True
                  break
              included.append(s)
              total += len(s)

          trimmed = '\n'.join(included)
          annotated_diff, valid_lines = parse_and_annotate(trimmed)
          if truncated:
              annotated_diff += '\n\n[...diff truncated — showing partial changes only...]'

          # Auto-review on PR open/sync → inline comments
          # @claude comments → plain answer
          use_inline = (event_name == 'pull_request')

          if use_inline:
              system_msg = (
                  "You are a senior code reviewer. Respond ONLY with valid JSON — no markdown fences, no prose outside JSON.\n"
                  "Schema:\n"
                  '{"summary":"<overall review in markdown>","comments":[{"file":"<exact path>","start_line":<integer or null>,"line":<integer>,"body":"<comment>"}]}\n'
                  "Rules:\n"
                  "- 'file' must exactly match a file path from the diff\n"
                  "- 'line' must be a line number shown as [L<n>] in the diff for that file (added lines only)\n"
                  "- 'start_line' is optional: use it when your comment spans multiple lines (e.g. a function body). Must be <= 'line' and also shown as [L<n>] in the same file. Set to null for single-line comments.\n"
                  "- Only add inline comments for bugs, security issues, logic errors, or important suggestions\n"
                  "- 'summary' should cover: what changed, overall quality, anything that needs attention\n"
                  "- If no inline comments are needed, use an empty array"
              )
              user_msg = (
                  f"Review this PR file by file.\n\n{pr_title}\n\n"
                  f"Diff (added lines annotated as [L<number>]):\n{annotated_diff}"
              )
          else:
              system_msg = "You are a senior code reviewer. Answer questions about the PR clearly and thoroughly."
              question = comment_body.replace('@claude', '').strip()
              user_msg = f"{pr_title}\n\nDiff:\n{annotated_diff}\n\nQuestion: {question}"

          payload = json.dumps({
              "model": "z-ai/glm-4.5-air:free",
              "messages": [
                  {"role": "system", "content": system_msg},
                  {"role": "user",   "content": user_msg}
              ]
          }).encode()

          req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=payload,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
                  "HTTP-Referer": "https://github.com",
                  "X-Title": "PR Review Bot"
              }
          )
          with urllib.request.urlopen(req) as resp:
              ai_data = json.loads(resp.read())

          content = (ai_data['choices'][0]['message'].get('content') or '').strip()
          print(f"[DEBUG] AI response length: {len(content)} chars")
          print(f"[DEBUG] AI response preview: {content[:500]}")

          if not content:
              raise ValueError(f"Empty response from model: {ai_data}")

          def post_plain(body):
              subprocess.run(['gh', 'pr', 'comment', pr_number, '--body', body], check=True)
              print("Posted plain comment.")

          if use_inline:
              try:
                  clean = re.sub(r'^```(?:json)?\s*', '', content, flags=re.MULTILINE)
                  clean = re.sub(r'\s*```$', '', clean, flags=re.MULTILINE).strip()
                  review_data = json.loads(clean)

                  summary      = review_data.get('summary', '').strip()
                  raw_comments = review_data.get('comments', [])
                  print(f"[DEBUG] JSON parsed OK. summary={bool(summary)}, raw_comments={len(raw_comments)}")

                  valid_comments = []
                  for c in raw_comments:
                      f  = c.get('file', '')
                      l  = c.get('line')
                      sl = c.get('start_line')
                      b  = c.get('body', '')
                      if not (f and l and b and f in valid_lines and int(l) in valid_lines[f]):
                          print(f"[DEBUG] Skipped comment: file={f!r} line={l} (not in diff)")
                          continue
                      entry = {"path": f, "line": int(l), "side": "RIGHT", "body": b}
                      if sl and sl != l and int(sl) in valid_lines.get(f, set()) and int(sl) <= int(l):
                          entry["start_line"] = int(sl)
                          entry["start_side"] = "RIGHT"
                      valid_comments.append(entry)

                  print(f"[DEBUG] valid_comments={len(valid_comments)}")

                  # If no inline comments survive filtering, post summary as plain comment
                  if not valid_comments:
                      post_plain(summary or content)
                  else:
                      sha = subprocess.run(
                          ['gh', 'pr', 'view', pr_number, '--json', 'headRefOid', '-q', '.headRefOid'],
                          capture_output=True, text=True, check=True
                      ).stdout.strip()

                      repo = subprocess.run(
                          ['gh', 'repo', 'view', '--json', 'nameWithOwner', '-q', '.nameWithOwner'],
                          capture_output=True, text=True, check=True
                      ).stdout.strip()
                      owner, repo_name = repo.split('/', 1)

                      review_payload = {
                          "commit_id": sha,
                          "body": summary or "Code review",
                          "event": "COMMENT",
                          "comments": valid_comments
                      }

                      gh_req = urllib.request.Request(
                          f"https://api.github.com/repos/{owner}/{repo_name}/pulls/{pr_number}/reviews",
                          data=json.dumps(review_payload).encode(),
                          headers={
                              "Authorization": f"Bearer {gh_token}",
                              "Accept": "application/vnd.github+json",
                              "Content-Type": "application/json",
                              "X-GitHub-Api-Version": "2022-11-28"
                          }
                      )
                      with urllib.request.urlopen(gh_req) as r:
                          json.loads(r.read())
                      print(f"Posted review with {len(valid_comments)} inline comments.")

              except Exception as e:
                  print(f"[DEBUG] Inline review failed: {e}. Falling back to plain comment.")
                  post_plain(content)
          else:
              post_plain(content)

          print("Done.")
          EOF
