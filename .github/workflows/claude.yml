name: Claude Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - uses: actions/checkout@v4

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Fetch PR data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.pr.outputs.number }}
          gh pr view $PR --json title,additions,deletions,changedFiles -q '"\(.title)\nFiles changed: \(.changedFiles) | +\(.additions) -\(.deletions)"' > pr_title.txt
          gh pr diff $PR > pr.diff 2>/dev/null || touch pr.diff

      - name: Call OpenRouter and post review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, subprocess, re

          MAX_CHARS = 80000

          api_key = os.environ['OPENROUTER_API_KEY']
          event_name = os.environ['EVENT_NAME']
          comment_body = os.environ.get('COMMENT_BODY', '')
          pr_number = os.environ['PR_NUMBER']

          with open('pr_title.txt') as f:
              pr_title = f.read().strip()
          with open('pr.diff') as f:
              full_diff = f.read().strip()

          # Split diff by file, include as many files as fit within MAX_CHARS
          file_sections = re.split(r'(?=^diff --git )', full_diff, flags=re.MULTILINE)
          diff, truncated = '', False
          for section in file_sections:
              if len(diff) + len(section) > MAX_CHARS:
                  truncated = True
                  break
              diff += section
          diff = diff.strip() or '(empty diff)'
          if truncated:
              diff += '\n\n[...diff truncated, showing partial changes only...]'

          if event_name in ('issue_comment', 'pull_request_review_comment'):
              question = comment_body.replace('@claude', '').strip()
              messages = [
                  {"role": "system", "content": "You are a senior code reviewer. Answer questions about the PR clearly and thoroughly."},
                  {"role": "user", "content": f"PR: {pr_title}\n\nDiff:\n{diff}\n\nQuestion: {question}"}
              ]
          else:
              messages = [
                  {"role": "system", "content": "You are a senior code reviewer. Review each changed file thoroughly. Be specific about issues."},
                  {"role": "user", "content": f"Review this PR file by file.\n\nPR: {pr_title}\n\nDiff:\n{diff}\n\nFor each file: what changed, any bugs or issues, suggestions. End with an overall assessment."}
              ]

          payload = json.dumps({
              "model": "z-ai/glm-4.5-air:free",
              "messages": messages
          }).encode()

          req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=payload,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
                  "HTTP-Referer": "https://github.com",
                  "X-Title": "PR Review Bot"
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          review = data['choices'][0]['message']['content']
          subprocess.run(['gh', 'pr', 'comment', pr_number, '--body', review], check=True)
          print("Review posted successfully.")
          EOF
