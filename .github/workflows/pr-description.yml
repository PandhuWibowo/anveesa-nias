name: Auto-generate PR description

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  contents: read

jobs:
  generate-description:
    runs-on: ubuntu-latest
    # Only run when the PR body still contains the blank template placeholder
    if: >
      !contains(github.event.pull_request.body, '<!-- auto-skip -->') &&
      contains(github.event.pull_request.body, '<!-- 1-3 sentences describing what this PR does and why -->')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          gh pr view $PR --json title,additions,deletions,changedFiles \
            -q '"PR: \(.title)\nFiles: \(.changedFiles) | +\(.additions) -\(.deletions)"' > /tmp/pr_title.txt
          gh pr diff $PR > /tmp/pr.diff 2>/dev/null || touch /tmp/pr.diff

      - name: Generate description via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, re

          MAX_CHARS = 12000

          api_key   = os.environ['OPENROUTER_API_KEY']
          pr_number = os.environ['PR_NUMBER']
          gh_token  = os.environ['GH_TOKEN']
          repo      = os.environ['REPO']

          with open('/tmp/pr_title.txt') as f:
              pr_title = f.read().strip()
          with open('/tmp/pr.diff') as f:
              full_diff = f.read().strip()

          template = """\
          ## Summary

          <!-- 1-3 sentences describing what this PR does and why -->

          ## Type of Change

          - [ ] Bug fix
          - [ ] New feature
          - [ ] Enhancement to existing feature
          - [ ] Refactor (no functional change)
          - [ ] Documentation
          - [ ] Chore / dependency update

          ## What Changed

          <!-- Bullet points grouped by area: frontend / backend / db / bug fix -->

          ## Related Issues

          <!-- Link any related issues: Closes #123 -->

          ## Verification

          - [ ] `cd server && go test ./...`
          - [ ] `cd web && npm run build`
          - [ ] Manual UI verification, if applicable
          - [ ] Tested on PostgreSQL / MySQL (if DB changes are included)
          - [ ] Tested on SQLite (default local setup)

          ## Checklist

          - [ ] The change is focused and reviewable.
          - [ ] New API endpoints are protected with appropriate permission checks.
          - [ ] Database migrations are backward-compatible (additive only — no column drops or renames).
          - [ ] Error messages are user-friendly and do not leak internal details.
          - [ ] Documentation was updated when behavior or configuration changed.
          - [ ] No secrets, local databases, logs, or generated build output are committed.
          - [ ] Security and permission impact was considered.

          ## Screenshots

          Add screenshots or video for visible UI changes.
          """
          import textwrap
          template = textwrap.dedent(template).strip()

          diff = full_diff[:MAX_CHARS]
          if len(full_diff) > MAX_CHARS:
              diff += '\n\n[...diff truncated...]'

          system_msg = (
              "You are a senior engineer writing a GitHub PR description. "
              "Output ONLY the filled template — no markdown fences, no extra text."
          )
          user_msg = (
              f"{pr_title}\n\n"
              f"Diff:\n{diff}\n\n"
              f"Fill in the template below. Rules:\n"
              f"- Replace the Summary HTML comment with 1-3 concise sentences.\n"
              f"- Check ONLY the relevant Type of Change boxes (replace [ ] with [x]).\n"
              f"- Replace the What Changed HTML comment with specific bullet points "
              f"grouped by area (frontend / backend / db / bug fix). Name the actual files and features.\n"
              f"- Leave the Related Issues HTML comment as-is.\n"
              f"- Leave ALL Verification and Checklist boxes unchecked.\n"
              f"- Keep the Screenshots line unchanged.\n\n"
              f"{template}"
          )

          payload = json.dumps({
              "model": "z-ai/glm-4.5-air:free",
              "messages": [
                  {"role": "system", "content": system_msg},
                  {"role": "user",   "content": user_msg}
              ]
          }).encode()

          req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=payload,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type":  "application/json",
                  "HTTP-Referer":  "https://github.com",
                  "X-Title":       "PR Description Bot"
              }
          )
          with urllib.request.urlopen(req) as resp:
              ai_data = json.loads(resp.read())

          # glm-4.5-air returns content in 'reasoning' when 'content' is None
          msg = ai_data['choices'][0]['message']
          body = (msg.get('content') or msg.get('reasoning') or '').strip()
          if not body:
              raise ValueError(f"Empty response from model: {ai_data}")

          # Strip any accidental markdown fences the model added
          body = re.sub(r'^```[a-z]*\n?', '', body, flags=re.MULTILINE)
          body = body.strip('`').strip()

          gh_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/pulls/{pr_number}",
              data=json.dumps({"body": body}).encode(),
              method="PATCH",
              headers={
                  "Authorization":        f"Bearer {gh_token}",
                  "Accept":               "application/vnd.github+json",
                  "Content-Type":         "application/json",
                  "X-GitHub-Api-Version": "2022-11-28"
              }
          )
          with urllib.request.urlopen(gh_req) as r:
              r.read()

          print("PR description updated successfully.")
          EOF
