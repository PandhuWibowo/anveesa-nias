name: Feature Request
description: Propose a focused improvement or new capability.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the workflow and expected behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: textarea
    id: security
    attributes:
      label: Security and Permission Impact
      description: Does this touch auth, SQL execution, saved credentials, public links, exports, or embeds?
  - type: textarea
    id: notes
    attributes:
      label: Additional Context
