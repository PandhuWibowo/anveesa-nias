name: Bug Report
description: Report a reproducible problem in Anveesa Nias.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for maintainers to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List the exact steps to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or Commit
      placeholder: "v0.1.0, main, or commit SHA"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, database driver, internal DB backend, and relevant configuration.
      placeholder: "Chrome 124, macOS, PostgreSQL internal DB, external PostgreSQL connection"
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste relevant logs. Remove secrets and connection strings first.
      render: shell
