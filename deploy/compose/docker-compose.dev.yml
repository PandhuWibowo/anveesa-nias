services:
  postgres:
    image: postgres:16-alpine
    container_name: nias-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nias}
      POSTGRES_USER: ${POSTGRES_USER:-nias}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nias}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend server with hot reload
  server:
    build:
      context: ../../server
      dockerfile: Dockerfile.dev
    container_name: nias-server-dev
    working_dir: /app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../server:/app
    environment:
      - NIAS_ENV=development
      - PORT=8080
      - DB_DRIVER=postgres
      - DATABASE_URL=postgres://${POSTGRES_USER:-nias}:${POSTGRES_PASSWORD:-change-this-password}@postgres:5432/${POSTGRES_DB:-nias}?sslmode=disable
      - JWT_SECRET=<DEV_ONLY_JWT_SECRET_PLACEHOLDER>
      - CORS_ORIGIN=http://localhost:5173
    command: ["go", "run", "."]

  # Frontend with Vite dev server
  web:
    image: oven/bun:1
    container_name: nias-web-dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ../../web:/app
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_API_PROXY_TARGET=http://server:8080
    command: ["sh", "-c", "bun install && bun run dev --host 0.0.0.0"]
